<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SearchUI - OSINT Workflow Editor</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- LiteGraph CSS -->
    <link rel="stylesheet" type="text/css" href="https://tamats.com/projects/litegraph/css/litegraph.css">
    <script type="text/javascript" src="https://tamats.com/projects/litegraph/build/litegraph.js"></script>
    <style>
        :root {
            --bg-base: #09090b;
            --bg-surface: #18181b;
            --bg-element: #27272a;
            --border-color: #3f3f46;
            --text-primary: #f4f4f5;
            --text-secondary: #a1a1aa;
            --accent-primary: #10b981;
            --accent-hover: #059669;
            --accent-glow: rgba(16, 185, 129, 0.2);
            --font-sans: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--bg-base);
            font-family: var(--font-sans);
            display: flex;
            color: var(--text-primary);
        }

        /* --- Sidebar Styles --- */
        .sidebar {
            position: relative;
            width: 60px;
            background: var(--bg-surface);
            border-right: 1px solid var(--border-color);
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 4px 0 25px rgba(0, 0, 0, 0.5);
            height: 100vh;
        }
        .sidebar.expanded {
            width: 300px;
        }
        .sidebar-top {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            overflow: hidden;
            min-height: 0;
        }
        .sidebar-bottom {
            flex-shrink: 0;
            border-top: 1px solid var(--border-color);
            background: rgba(0, 0, 0, 0.2);
        }
        .nav-item {
            padding: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            color: var(--text-secondary);
            white-space: nowrap;
            user-select: none;
            transition: all 0.2s ease;
        }
        .nav-item:hover, .nav-item.active {
            background: var(--bg-element);
            color: var(--text-primary);
        }
        .nav-item .icon {
            font-size: 20px;
            width: 28px;
            text-align: center;
            margin-right: 14px;
        }
        .nav-item .label {
            opacity: 0;
            transition: opacity 0.2s;
            font-weight: 600;
            font-size: 14px;
        }
        .sidebar.expanded .nav-item .label {
            opacity: 1;
        }

        /* --- Node List Styles --- */
        .nodes-container {
            display: none;
            padding: 15px;
            overflow-y: auto;
            flex-grow: 1;
            flex-shrink: 1;
            min-height: 0;
            background: rgba(0,0,0,0.15);
        }
        .sidebar.expanded .nodes-container.visible {
            display: block;
        }
        .node-category {
            color: var(--text-secondary);
            margin-top: 20px;
            margin-bottom: 10px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1.5px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
        }
        .node-category:first-child {
            margin-top: 5px;
        }
        .node-item {
            background: var(--bg-element);
            padding: 10px 12px;
            margin-bottom: 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-primary);
            border-left: 4px solid var(--border-color);
            transition: all 0.2s ease;
            user-select: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .node-item:hover {
            background: var(--accent-primary);
            border-left-color: #81c784;
            transform: translateX(4px);
            box-shadow: 0 4px 12px var(--accent-glow);
        }
        .node-item::after {
            content: "+";
            font-weight: bold;
            opacity: 0.5;
        }

        /* --- Canvas & UI Panel --- */
        .canvas-container {
            flex-grow: 1;
            position: relative;
            background-color: var(--bg-base);
            display: flex;
            flex-direction: column;
        }
        .canvas-workspace {
            flex: 1 1 0;
            position: relative;
            width: 100%;
            min-height: 0;
            overflow: hidden;
        }
        #graphcanvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        /* --- Tab Navigation Bar --- */
        .tab-bar {
            display: flex;
            align-items: center;
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border-color);
            padding: 0 10px;
            height: 45px;
            user-select: none;
            overflow-x: auto;
            flex-shrink: 0;
        }
        .tab-item {
            display: flex;
            align-items: center;
            padding: 0 16px;
            height: 100%;
            border-right: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
            position: relative;
            gap: 8px;
        }
        .tab-item:hover {
            background: var(--bg-element);
            color: var(--text-primary);
        }
        .tab-item.active {
            background: var(--bg-base);
            color: var(--text-primary);
            font-weight: 600;
        }
        .tab-item.active::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--accent-primary);
        }
        .tab-name {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 120px;
        }
        .tab-close {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            font-size: 10px;
            line-height: 1;
            transition: background 0.15s;
        }
        .tab-close:hover {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
        .btn-add-tab {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 26px;
            height: 26px;
            border-radius: 6px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.15s;
            margin-left: 8px;
            font-size: 16px;
            border: 1px dashed var(--border-color);
        }
        .btn-add-tab:hover {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
            background: rgba(16, 185, 129, 0.1);
        }

        .ui-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(24, 24, 27, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            color: var(--text-primary);
            z-index: 10;
            width: 320px;
            transition: all 0.3s ease;
        }
        
        .ui-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .ui-panel-title {
            margin: 0;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: var(--text-primary);
        }

        button.btn-execute {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--accent-primary) 0%, #059669 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 15px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px var(--accent-glow);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        button.btn-execute:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(16, 185, 129, 0.4);
        }
        button.btn-execute:active {
            transform: translateY(0);
        }
        
        .result-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        #result-box {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 8px;
            min-height: 100px;
            max-height: 350px;
            word-wrap: break-word;
            font-family: var(--font-mono);
            font-size: 12px;
            overflow-y: auto;
            color: #34d399;
        }
        
        /* Custom scrollbar styling */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        /* --- Secrets Vault Panel Styles --- */
        .vault-container {
            display: none;
            padding: 15px;
            overflow-y: auto;
            flex-grow: 1;
            flex-shrink: 1;
            min-height: 0;
            background: rgba(0,0,0,0.15);
        }
        .vault-container.visible {
            display: block;
        }
        .vault-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
            color: var(--text-primary);
        }
        .vault-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.03);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }
        .vault-form label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
        }
        .vault-form input {
            background: var(--bg-base);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 8px 10px;
            color: var(--text-primary);
            font-family: var(--font-sans);
            font-size: 13px;
        }
        .vault-form button {
            background: var(--accent-primary);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .vault-form button:hover {
            background: var(--accent-hover);
        }
        .vault-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-element);
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 8px;
            font-size: 13px;
            border: 1px solid var(--border-color);
        }
        .vault-item-name {
            font-weight: 600;
            color: var(--text-primary);
        }
        .vault-item-mask {
            color: var(--text-secondary);
            font-family: var(--font-mono);
            font-size: 12px;
        }

        /* --- Settings Panel Styles --- */
        .settings-container {
            display: none;
            padding: 15px;
            overflow-y: auto;
            flex-grow: 1;
            flex-shrink: 1;
            min-height: 0;
            background: rgba(0,0,0,0.15);
        }
        .settings-container.visible {
            display: block;
        }
        .settings-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 4px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
            color: var(--text-primary);
        }
        .settings-subtitle {
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 14px;
        }
        .provider-pill-row {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 16px;
        }
        .provider-pill {
            padding: 5px 10px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.15s;
            background: var(--bg-element);
            white-space: nowrap;
        }
        .provider-pill:hover, .provider-pill.selected {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
            background: rgba(16,185,129,0.1);
        }
        .settings-form {
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: rgba(255,255,255,0.03);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-bottom: 16px;
        }
        .settings-form label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: -4px;
        }
        .settings-form input, .settings-form select {
            background: var(--bg-base);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 7px 10px;
            color: var(--text-primary);
            font-family: var(--font-sans);
            font-size: 12px;
            width: 100%;
            box-sizing: border-box;
        }
        .settings-form input:focus, .settings-form select:focus {
            outline: none;
            border-color: var(--accent-primary);
        }
        .settings-notes {
            font-size: 11px;
            color: var(--text-secondary);
            font-style: italic;
            margin-top: -4px;
        }
        .settings-btn-row {
            display: flex;
            gap: 8px;
        }
        .settings-btn {
            flex: 1;
            background: var(--accent-primary);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 8px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .settings-btn:hover { background: var(--accent-hover); }
        .settings-btn.danger {
            background: rgba(239,68,68,0.2);
            color: #ef4444;
        }
        .settings-btn.danger:hover { background: rgba(239,68,68,0.3); }
        .saved-provider-item {
            background: var(--bg-element);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: border-color 0.15s;
        }
        .saved-provider-item:hover { border-color: var(--accent-primary); }
        .saved-provider-item.active-provider {
            border-color: var(--accent-primary);
            background: rgba(16,185,129,0.08);
        }
        .saved-provider-name {
            font-weight: 600;
            font-size: 13px;
            color: var(--text-primary);
        }
        .saved-provider-meta {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 2px;
            font-family: var(--font-mono);
        }
        .active-badge {
            display: inline-block;
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 10px;
            background: rgba(16,185,129,0.2);
            color: var(--accent-primary);
            font-weight: 700;
            margin-left: 6px;
        }

        /* ── Subgraph Editor Overlay ─────────────────────────────── */
        .subgraph-overlay {
            position: fixed;
            inset: 0;
            z-index: 2000;
            display: none;
            flex-direction: column;
            background: #0d0d10;
        }
        .subgraph-overlay.open { display: flex; }
        .subgraph-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 20px;
            height: 52px;
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
            user-select: none;
        }
        .subgraph-breadcrumb {
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
        }
        .subgraph-breadcrumb strong { color: var(--text-primary); }
        .subgraph-breadcrumb .sep { opacity: 0.4; }
        .subgraph-node-pill {
            background: rgba(30,58,95,0.6);
            border: 1px solid #1e3a5f;
            border-radius: 6px;
            padding: 3px 10px;
            font-size: 12px;
            font-weight: 600;
            color: #7dd3fc;
        }
        .subgraph-btn {
            padding: 7px 16px;
            border-radius: 7px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.15s;
        }
        .subgraph-btn.save {
            background: linear-gradient(135deg, var(--accent-primary), #059669);
            color: white;
            box-shadow: 0 2px 8px var(--accent-glow);
        }
        .subgraph-btn.save:hover { transform: translateY(-1px); box-shadow: 0 4px 12px var(--accent-glow); }
        .subgraph-btn.cancel {
            background: var(--bg-element);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }
        .subgraph-btn.cancel:hover { color: var(--text-primary); }
        .subgraph-workspace {
            flex: 1 1 0;
            position: relative;
            overflow: hidden;
            display: flex;
        }
        .subgraph-sidebar {
            width: 220px;
            flex-shrink: 0;
            background: var(--bg-surface);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 12px;
        }
        .subgraph-sidebar-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 10px;
            margin-top: 6px;
        }
        .subgraph-node-item {
            background: var(--bg-element);
            border: 1px solid var(--border-color);
            border-left: 3px solid var(--border-color);
            border-radius: 6px;
            padding: 8px 10px;
            margin-bottom: 6px;
            cursor: pointer;
            font-size: 12px;
            color: var(--text-primary);
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 7px;
        }
        .subgraph-node-item:hover {
            transform: translateX(3px);
            border-left-color: var(--accent-primary);
            color: var(--accent-primary);
        }
        .subgraph-canvas-area {
            flex: 1 1 0;
            position: relative;
            overflow: hidden;
        }
        #subgraph-canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .subgraph-hint {
            position: absolute;
            bottom: 14px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(6px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 5px 14px;
            font-size: 11px;
            color: var(--text-secondary);
            pointer-events: none;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <!-- Sidebar Navigation -->
    <div id="sidebar" class="sidebar">
        <div class="sidebar-top">
            <div class="nav-item active" id="toggle-nodes" title="Nodes Library">
                <span class="icon">🗂️</span>
                <span class="label">Nodes Library</span>
            </div>
            <div class="nav-item" id="toggle-vault" title="Secrets Vault">
                <span class="icon">🔑</span>
                <span class="label">Secrets Vault</span>
            </div>

            <!-- Dynamically populated list of nodes -->
            <div id="nodes-container" class="nodes-container"></div>

            <!-- Secrets Vault Configuration Panel -->
            <div id="vault-container" class="vault-container">
                <h3 class="vault-title">Secrets Vault</h3>
                <div class="vault-form">
                    <label for="secretService">Service Name</label>
                    <input type="text" id="secretService" placeholder="e.g. GraphQL, SerpApi" value="GraphQL">
                    
                    <label for="secretValue">Credential/API Key</label>
                    <input type="password" id="secretValue" placeholder="Paste key here...">
                    
                    <button id="saveKeyBtn">Save Secret</button>
                </div>
                <h4 style="font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--text-secondary); margin-bottom:10px;">Stored Secrets</h4>
                <div id="vault-list"></div>
            </div>
            <!-- Settings Panel -->
            <div id="settings-container" class="settings-container"></div>
        </div>

        <div class="sidebar-bottom">
            <div class="nav-item" id="toggle-settings" title="Settings">
                <span class="icon">⚙️</span>
                <span class="label">Settings</span>
            </div>
            <div class="nav-item" title="Console">
                <span class="icon">🖥️</span>
                <span class="label">Console</span>
            </div>
            <div class="nav-item" title="About">
                <span class="icon">ℹ️</span>
                <span class="label">About</span>
            </div>
        </div>
    </div>

    <!-- Subgraph Editor Overlay -->
    <div id="subgraph-overlay" class="subgraph-overlay">
        <div class="subgraph-header">
            <div class="subgraph-breadcrumb">
                <span>Main Canvas</span>
                <span class="sep">›</span>
                <span class="subgraph-node-pill" id="subgraph-breadcrumb-name">Custom API</span>
            </div>
            <button class="subgraph-btn cancel" id="subgraph-cancel-btn">✕ Cancel</button>
            <button class="subgraph-btn save" id="subgraph-save-btn">✓ Save &amp; Close</button>
        </div>
        <div class="subgraph-workspace">
            <div class="subgraph-sidebar" id="subgraph-sidebar">
                <div class="subgraph-sidebar-title">Subgraph Nodes</div>
            </div>
            <div class="subgraph-canvas-area">
                <canvas id="subgraph-canvas"></canvas>
                <div class="subgraph-hint">Double-click canvas to add nodes · Drag to connect · Right-click for menu</div>
            </div>
        </div>
    </div>

    <!-- Main Canvas Area -->
    <div class="canvas-container">
        <!-- Top Tab Navigation Bar -->
        <div id="tab-bar" class="tab-bar"></div>
        
        <div class="canvas-workspace">
            <div class="ui-panel">
                <div class="ui-panel-header">
                    <h3 class="ui-panel-title">SearchUI Controller</h3>
                    <span style="font-size: 11px; padding: 2px 6px; background: rgba(16,185,129,0.15); color: var(--accent-primary); border-radius: 20px; font-weight: 600;">Active</span>
                </div>
                <button id="executeBtn" class="btn-execute">
                    <span>⚡</span> Execute Workflow
                </button>
                <div class="result-title">Execution Console:</div>
                <div id="result-box">Waiting for execution...</div>
            </div>
            <canvas id="graphcanvas"></canvas>
        </div>
    </div>

    <script>
        // --- Configure LiteGraph aesthetics ---
        LiteGraph.NODE_DEFAULT_BGCOLOR = "#18181b";
        LiteGraph.NODE_DEFAULT_COLOR = "#27272a";
        LiteGraph.NODE_DEFAULT_BOXCOLOR = "#3f3f46";
        LiteGraph.NODE_TEXT_COLOR = "#f4f4f5";
        LiteGraph.NODE_SELECTED_TITLE_COLOR = "#ffffff";
        LiteGraph.release_link_on_empty_shows_menu = true;
        
        // Custom link styling
        var graph = new LGraph();
        var canvas = new LGraphCanvas("#graphcanvas", graph);
        canvas.background_image = null; // Clear standard grid image
        
        // Link type colors for OSINT semantics
        LGraphCanvas.link_type_colors = {
            "image": "#10b981",          // Green
            "video": "#3b82f6",          // Blue
            "hash": "#a855f7",           // Purple
            "search_results": "#f59e0b", // Amber
            "string": "#ec4899"          // Pink
        };

        function resizeCanvas() {
            var rect = canvas.canvas.parentNode.getBoundingClientRect();
            canvas.resize(rect.width, rect.height);
        }
        window.addEventListener("resize", resizeCanvas);
        setTimeout(resizeCanvas, 100);

        // --- Sidebar Logic ---
        const sidebar = document.getElementById("sidebar");
        const toggleNodesBtn = document.getElementById("toggle-nodes");
        const toggleVaultBtn = document.getElementById("toggle-vault");
        const nodesContainer = document.getElementById("nodes-container");
        const vaultContainer = document.getElementById("vault-container");

        function showPanel(panelType) {
            // Clear all panels first
            [toggleNodesBtn, toggleVaultBtn].forEach(b => b && b.classList.remove("active"));
            nodesContainer.classList.remove("visible");
            vaultContainer.classList.remove("visible");
            const sc = document.getElementById("settings-container");
            const tsb = document.getElementById("toggle-settings");
            if (sc) sc.classList.remove("visible");
            if (tsb) tsb.classList.remove("active");

            if (panelType === "nodes") {
                toggleNodesBtn.classList.add("active");
                nodesContainer.classList.add("visible");
                sidebar.classList.add("expanded");
            } else if (panelType === "vault") {
                toggleVaultBtn.classList.add("active");
                vaultContainer.classList.add("visible");
                sidebar.classList.add("expanded");
                loadVaultKeys();
            } else if (panelType === "settings") {
                if (tsb) tsb.classList.add("active");
                if (sc) sc.classList.add("visible");
                sidebar.classList.add("expanded");
                if (typeof buildSettingsUI === "function") buildSettingsUI();
            }
            setTimeout(resizeCanvas, 300);
        }

        toggleNodesBtn.addEventListener("click", () => {
            if (sidebar.classList.contains("expanded") && nodesContainer.classList.contains("visible")) {
                sidebar.classList.remove("expanded");
                nodesContainer.classList.remove("visible");
            } else { showPanel("nodes"); }
            setTimeout(resizeCanvas, 300);
        });

        toggleVaultBtn.addEventListener("click", () => {
            if (sidebar.classList.contains("expanded") && vaultContainer.classList.contains("visible")) {
                sidebar.classList.remove("expanded");
                vaultContainer.classList.remove("visible");
            } else { showPanel("vault"); }
            setTimeout(resizeCanvas, 300);
        });

        function loadVaultKeys() {
            const vaultList = document.getElementById("vault-list");
            vaultList.innerHTML = "<div style='color: var(--text-secondary); font-size:12px;'>Loading keys...</div>";
            
            fetch("/vault/list")
            .then(res => res.json())
            .then(data => {
                vaultList.innerHTML = "";
                if (data.status === "success" && data.keys) {
                    if (data.keys.length === 0) {
                        vaultList.innerHTML = "<div style='color: var(--text-secondary); font-size:12px;'>No keys configured yet.</div>";
                    } else {
                        data.keys.forEach(key => {
                            const item = document.createElement("div");
                            item.className = "vault-item";
                            item.innerHTML = `
                                <span class="vault-item-name">${key}</span>
                                <span class="vault-item-mask">configured</span>
                            `;
                            vaultList.appendChild(item);
                        });
                    }
                } else {
                    vaultList.innerHTML = `<div style='color: #ef4444; font-size:12px;'>Error: ${data.message}</div>`;
                }
            })
            .catch(err => {
                vaultList.innerHTML = `<div style='color: #ef4444; font-size:12px;'>Load error: ${err}</div>`;
            });
        }

        document.getElementById("saveKeyBtn").addEventListener("click", () => {
            const service = document.getElementById("secretService").value.trim();
            const value = document.getElementById("secretValue").value.trim();
            
            if (!service || !value) {
                alert("Please specify both service name and key value.");
                return;
            }
            
            fetch("/vault/set", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ service, value })
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === "success") {
                    document.getElementById("secretValue").value = "";
                    loadVaultKeys();
                } else {
                    alert("Failed to save secret: " + data.message);
                }
            })
            .catch(err => alert("Error saving secret: " + err));
        });

        // --- Settings Panel Logic ---
        const toggleSettingsBtn = document.getElementById("toggle-settings");
        const settingsContainer = document.getElementById("settings-container");

        let knownProviders = {};
        let savedProviders = [];
        let activeProviderId = null;
        let selectedPresetId = null;

        toggleSettingsBtn.addEventListener("click", () => {
            if (sidebar.classList.contains("expanded") && settingsContainer.classList.contains("visible")) {
                sidebar.classList.remove("expanded");
                settingsContainer.classList.remove("visible");
                toggleSettingsBtn.classList.remove("active");
            } else {
                showPanel("settings");
            }
            setTimeout(resizeCanvas, 300);
        });

        function buildSettingsUI() {
            settingsContainer.innerHTML = `
                <div class="settings-title">⚙️ LLM Providers</div>
                <div class="settings-subtitle">Select a preset or add a custom endpoint for AI nodes.</div>
                <div id="settings-status" style="font-size:11px;color:var(--text-secondary);margin-bottom:12px;">Loading…</div>

                <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-secondary);margin-bottom:8px;">Quick Presets</div>
                <div id="provider-pills" class="provider-pill-row"></div>

                <div class="settings-form" id="provider-form">
                    <label>Provider Name / ID</label>
                    <input id="sf-id" type="text" placeholder="e.g. my-openai" />
                    <label>Display Name</label>
                    <input id="sf-name" type="text" placeholder="e.g. OpenAI GPT-4o" />
                    <label>Base URL</label>
                    <input id="sf-url" type="text" placeholder="https://api.openai.com/v1" />
                    <label>API Key <span style="font-weight:400;font-style:italic;">(leave blank for local)</span></label>
                    <input id="sf-key" type="password" placeholder="sk-…" autocomplete="off" />
                    <label>Default Model</label>
                    <input id="sf-model" type="text" placeholder="e.g. gpt-4o-mini" />
                    <label>API Style</label>
                    <select id="sf-style">
                        <option value="openai">OpenAI-compatible</option>
                        <option value="ollama">Ollama</option>
                        <option value="anthropic">Anthropic</option>
                    </select>
                    <div id="sf-notes" class="settings-notes"></div>
                    <div class="settings-btn-row">
                        <button class="settings-btn" id="sf-save">💾 Save Provider</button>
                    </div>
                </div>

                <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-secondary);margin-bottom:8px;">Saved Providers</div>
                <div id="saved-providers-list">Loading…</div>
            `;

            // Load known presets and saved providers
            Promise.all([
                fetch("/settings/known-providers").then(r => r.json()),
                fetch("/settings/providers").then(r => r.json())
            ]).then(([known, saved]) => {
                knownProviders = known.providers || {};
                savedProviders = saved.providers || [];
                activeProviderId = saved.active_provider || null;

                // Render preset pills
                const pillRow = document.getElementById("provider-pills");
                pillRow.innerHTML = "";
                for (const [pid, preset] of Object.entries(knownProviders)) {
                    const pill = document.createElement("div");
                    pill.className = "provider-pill";
                    pill.textContent = preset.name;
                    pill.dataset.pid = pid;
                    pill.addEventListener("click", () => {
                        document.querySelectorAll(".provider-pill").forEach(p => p.classList.remove("selected"));
                        pill.classList.add("selected");
                        selectedPresetId = pid;
                        fillFormFromPreset(pid, preset);
                    });
                    pillRow.appendChild(pill);
                }

                renderSavedProviders();
                updateStatusBar();

            }).catch(err => {
                document.getElementById("settings-status").textContent = "⚠️ Could not load providers: " + err;
            });

            // Save button
            document.getElementById("sf-save").addEventListener("click", () => {
                const pid = document.getElementById("sf-id").value.trim().replace(/\s+/g, "_");
                const name = document.getElementById("sf-name").value.trim();
                const url = document.getElementById("sf-url").value.trim();
                const key = document.getElementById("sf-key").value.trim();
                const model = document.getElementById("sf-model").value.trim();
                const style = document.getElementById("sf-style").value;
                if (!pid || !name || !url) {
                    alert("Provider ID, Name, and Base URL are required.");
                    return;
                }
                fetch(`/settings/providers/${encodeURIComponent(pid)}`, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({ name, base_url: url, api_key: key, model, api_style: style, notes: "" })
                })
                .then(r => r.json())
                .then(d => {
                    if (d.status === "success") {
                        fetch("/settings/providers").then(r => r.json()).then(data => {
                            savedProviders = data.providers || [];
                            activeProviderId = data.active_provider;
                            renderSavedProviders();
                        });
                    } else {
                        alert("Failed to save: " + d.message);
                    }
                });
            });
        }

        function fillFormFromPreset(pid, preset) {
            document.getElementById("sf-id").value = pid + "_" + Date.now().toString().slice(-4);
            document.getElementById("sf-name").value = preset.name;
            document.getElementById("sf-url").value = preset.base_url;
            document.getElementById("sf-key").value = "";
            document.getElementById("sf-model").value = preset.default_model || "";
            document.getElementById("sf-style").value = preset.api_style || "openai";
            document.getElementById("sf-notes").textContent = preset.notes || "";
        }

        function renderSavedProviders() {
            const list = document.getElementById("saved-providers-list");
            if (!list) return;
            if (!savedProviders.length) {
                list.innerHTML = "<div style='color:var(--text-secondary);font-size:12px;'>No providers saved yet. Pick a preset above.</div>";
                return;
            }
            list.innerHTML = "";
            savedProviders.forEach(p => {
                const item = document.createElement("div");
                const isActive = p.id === activeProviderId;
                item.className = "saved-provider-item" + (isActive ? " active-provider" : "");
                item.innerHTML = `
                    <div class="saved-provider-name">
                        ${p.name}
                        ${isActive ? '<span class="active-badge">● ACTIVE</span>' : ""}
                    </div>
                    <div class="saved-provider-meta">${p.base_url} · ${p.model || p.default_model || "—"}</div>
                    <div style="display:flex;gap:6px;margin-top:8px;">
                        ${!isActive ? `<button class="settings-btn" style="font-size:11px;padding:5px;" onclick="activateProvider('${p.id}')">▶ Set Active</button>` : `<span style="font-size:11px;color:var(--accent-primary);font-weight:600;">✓ Currently Active</span>`}
                        <button class="settings-btn danger" style="font-size:11px;padding:5px;flex:0 0 auto;" onclick="deleteProvider('${p.id}')">✕</button>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        function updateStatusBar() {
            const bar = document.getElementById("settings-status");
            if (!bar) return;
            if (activeProviderId && savedProviders.length) {
                const active = savedProviders.find(p => p.id === activeProviderId);
                bar.innerHTML = active
                    ? `<span style="color:var(--accent-primary);">● Active: <strong>${active.name}</strong> (${active.base_url})</span>`
                    : `<span style="color:#f59e0b;">⚠ Active provider ID "${activeProviderId}" not found in saved list.</span>`;
            } else {
                bar.textContent = "No active provider. Nodes will fall back to local Ollama.";
            }
        }

        window.activateProvider = function(pid) {
            fetch("/settings/active", {
                method: "PUT",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ provider_id: pid })
            })
            .then(r => r.json())
            .then(d => {
                if (d.status === "success") {
                    activeProviderId = pid;
                    renderSavedProviders();
                    updateStatusBar();
                }
            });
        };

        window.deleteProvider = function(pid) {
            if (!confirm(`Delete provider "${pid}"?`)) return;
            fetch(`/settings/providers/${encodeURIComponent(pid)}`, { method: "DELETE" })
            .then(r => r.json())
            .then(d => {
                if (d.status === "success") {
                    savedProviders = savedProviders.filter(p => p.id !== pid);
                    if (activeProviderId === pid) activeProviderId = null;
                    renderSavedProviders();
                    updateStatusBar();
                }
            });
        };



        // --- Generic Placeholder Node ---
        function PlaceholderNode() {
            if (this.onRegister) { this.onRegister(); }
        }

        // --- Nodes Implementation ---

        // Clear all default registered node types to keep only OSINT / SearchUI custom nodes
        if (typeof LiteGraph.clearRegisteredTypes === "function") {
            LiteGraph.clearRegisteredTypes();
        } else {
            LiteGraph.registered_node_types = {};
        }

        // == 1. Input Nodes ==
        function ImageInputNode() {
            this.addOutput("Image", "image");
            this.properties = { url: "https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5", local_path: "", filename: "" };
            this.size = [240, 90];
            
            this.addWidget("text", "URL", this.properties.url, (v) => { 
                this.properties.url = v; 
                this.properties.local_path = "";
                this.properties.filename = "";
            });
            
            this.addWidget("button", "Upload Image", "", () => {
                const input = document.createElement("input");
                input.type = "file";
                input.accept = "image/*";
                input.onchange = () => {
                    const file = input.files[0];
                    if (!file) return;
                    
                    const formData = new FormData();
                    formData.append("file", file);
                    
                    fetch("/upload", {
                        method: "POST",
                        body: formData
                    })
                    .then(res => res.json())
                    .then(data => {
                        if (data.status === "success") {
                            this.properties.url = data.url;
                            this.properties.local_path = data.local_path;
                            this.properties.filename = data.filename;
                            if (this.widgets && this.widgets[0]) {
                                this.widgets[0].value = data.url;
                            }
                            this.setDirtyCanvas(true, true);
                        } else {
                            alert("Upload failed: " + data.message);
                        }
                    })
                    .catch(err => alert("Upload error: " + err));
                };
                input.click();
            });
        }
        ImageInputNode.title = "Image Input";
        ImageInputNode.color = "#064e3b"; // dark emerald
        ImageInputNode.prototype.onExecute = function() {
            this.setOutputData(0, {
                type: "image",
                url: this.properties.url,
                local_path: this.properties.local_path,
                filename: this.properties.filename
            });
        };
        LiteGraph.registerNodeType("input/image", ImageInputNode);

        // == 2. Processing Nodes ==
        function HashNode() {
            this.addInput("Media", 0);
            this.addOutput("Hash", "hash");
            this.properties = { algorithm: "md5", hash_value: "" };
            this.size = [200, 80];
            
            this.addWidget("combo", "Algorithm", this.properties.algorithm, (v) => { 
                this.properties.algorithm = v;
                this.title = "Hash (" + v.toUpperCase() + ")";
            }, { values: ["md5", "sha256"] });
        }
        HashNode.title = "Generate Hash (MD5)";
        HashNode.color = "#581c87"; // dark purple
        HashNode.prototype.onBackendExecuted = function(outputs) {
            if (outputs && outputs[0]) {
                this.properties.hash_value = outputs[0].value;
            }
        };
        HashNode.prototype.onDrawBackground = function(ctx) {
            if (this.flags.collapsed) return;
            if (this.properties.hash_value) {
                ctx.fillStyle = "#a1a1aa";
                ctx.font = "10px monospace";
                ctx.fillText("Val: " + this.properties.hash_value.substring(0, 20) + "...", 12, 68);
            }
        };
        LiteGraph.registerNodeType("process/hash", HashNode);

        function OpenCVKeyframeNode() {
            this.addInput("Video", "video");
            this.addOutput("Frame", "image");
            this.properties = { frame_index: -1 };
            this.size = [220, 80];
            this.addWidget("number", "Frame Index", this.properties.frame_index, (v) => { 
                this.properties.frame_index = Math.floor(v); 
            }, { precision: 0, min: -1 });
        }
        OpenCVKeyframeNode.title = "OpenCV: Keyframe Extractor";
        OpenCVKeyframeNode.color = "#581c87";
        OpenCVKeyframeNode.prototype.onBackendExecuted = function(outputs) {
            if (outputs && outputs[0]) {
                this.backend_output = outputs[0];
            }
        };
        OpenCVKeyframeNode.prototype.onExecute = function() {
            if (this.backend_output) {
                this.setOutputData(0, this.backend_output);
            } else {
                this.setOutputData(0, { type: "image", url: "", local_path: "" });

        LiteGraph.registerNodeType("process/opencv_keyframe", OpenCVKeyframeNode);

        function MetadataNode() {
            this.addInput("Media", 0);
            this.addOutput("Meta", "metadata");
            this.size = [280, 160];
            this.properties = { info: "" };
        }
        MetadataNode.title = "Metadata Extractor";
        MetadataNode.color = "#581c87";
        MetadataNode.prototype.onBackendExecuted = function(outputs) {
            if (outputs && outputs[0]) {
                let text = JSON.stringify(outputs[0].metadata, null, 2);
                this.properties.info = text;
            }
        };
        MetadataNode.prototype.onExecute = function() {
            if (this.properties.info) {
                this.setOutputData(0, JSON.parse(this.properties.info));
            }
        };
        MetadataNode.prototype.onDrawBackground = function(ctx) {
            if (this.flags.collapsed) return;
            ctx.fillStyle = "#09090b";
            ctx.fillRect(10, 25, this.size[0] - 20, this.size[1] - 35);
            ctx.fillStyle = "#a1a1aa";
            ctx.font = "10px var(--font-mono)";
            
            const text = this.properties.info || "No Metadata Loaded";
            const lines = text.split("\n");
            let y = 40;
            for (let i = 0; i < lines.length; i++) {
                if (y > this.size[1] - 15) break;
                ctx.fillText(lines[i], 16, y);
                y += 13;
            }
        };
        LiteGraph.registerNodeType("process/metadata", MetadataNode);

        function OCRNode() {
            this.addInput("Image", "image");
            this.addOutput("Text", "string");
            this.size = [260, 100];
            this.properties = { text: "" };
        }
        OCRNode.title = "OCR: Extract Text";
        OCRNode.color = "#581c87";
        OCRNode.prototype.onBackendExecuted = function(outputs) {
            if (outputs && outputs[0]) {
                this.properties.text = outputs[0];
            }
        };
        OCRNode.prototype.onExecute = function() {
            this.setOutputData(0, this.properties.text);
        };
        OCRNode.prototype.onDrawBackground = function(ctx) {
            if (this.flags.collapsed) return;
            ctx.fillStyle = "#09090b";
            ctx.fillRect(10, 25, this.size[0] - 20, this.size[1] - 35);
            ctx.fillStyle = "#34d399";
            ctx.font = "11px var(--font-mono)";
            
            const text = this.properties.text || "No OCR text extracted";
            const lines = text.split("\n");
            let y = 40;
            for (let i = 0; i < lines.length; i++) {
                if (y > this.size[1] - 15) break;
                ctx.fillText(lines[i], 16, y);
                y += 13;
            }
        };
        LiteGraph.registerNodeType("process/ocr", OCRNode);

        function TranscribeAudioNode() {

        // == 4.2 Entity & Chronology Visualizers ==
        function RelationshipGraphNode() {
            this.addInput("Text", 0);
            this.size = [350, 240];
            this.properties = { graph_data: null };
        }
        RelationshipGraphNode.title = "Relationship Graph";
        RelationshipGraphNode.color = "#18181b";
        RelationshipGraphNode.prototype.onBackendExecuted = function(outputs) {
            if (outputs && outputs[0]) {
                this.properties.graph_data = outputs[0];
            }
        };
        RelationshipGraphNode.prototype.onDrawBackground = function(ctx) {
            if (this.flags.collapsed) return;
            
            ctx.fillStyle = "#09090b";
            ctx.fillRect(10, 25, this.size[0] - 20, this.size[1] - 35);
            
            const data = this.properties.graph_data;
            if (!data || !data.nodes || data.nodes.length === 0) {
                ctx.fillStyle = "#a1a1aa";
                ctx.font = "12px var(--font-sans)";
                ctx.textAlign = "center";
                ctx.fillText("No relationships extracted", this.size[0] / 2, this.size[1] / 2 + 10);
                return;
            }
            
            const centerX = this.size[0] / 2;
            const centerY = this.size[1] / 2 + 10;
            const radius = Math.min(this.size[0], this.size[1]) / 3;
            
            const nodeCoords = {};
            const mainNode = data.nodes.find(n => n.type === "source") || data.nodes[0];
            nodeCoords[mainNode.id] = { x: centerX, y: centerY };
            
            const outerNodes = data.nodes.filter(n => n.id !== mainNode.id);
            outerNodes.forEach((n, idx) => {
                const angle = (idx / outerNodes.length) * 2 * Math.PI;
                nodeCoords[n.id] = {
                    x: centerX + radius * Math.cos(angle),
                    y: centerY + radius * Math.sin(angle)
                };
            });
            
            ctx.strokeStyle = "rgba(161, 161, 170, 0.4)";
            ctx.lineWidth = 1.5;
            data.edges.forEach(edge => {
                const src = nodeCoords[edge.source];
                const tgt = nodeCoords[edge.target];
                if (src && tgt) {
                    ctx.beginPath();
                    ctx.moveTo(src.x, src.y);
                    ctx.lineTo(tgt.x, tgt.y);
                    ctx.stroke();
                }
            });
            
            data.nodes.forEach(node => {
                const coord = nodeCoords[node.id];
                if (!coord) return;
                
                ctx.beginPath();
                if (node.type === "source") {
                    ctx.arc(coord.x, coord.y, 8, 0, 2 * Math.PI);
                    ctx.fillStyle = "#3b82f6";
                } else if (node.type === "ip") {
                    ctx.arc(coord.x, coord.y, 5, 0, 2 * Math.PI);
                    ctx.fillStyle = "#ef4444";
                } else if (node.type === "email") {
                    ctx.arc(coord.x, coord.y, 5, 0, 2 * Math.PI);
                    ctx.fillStyle = "#fbbf24";
                } else {
                    ctx.arc(coord.x, coord.y, 5, 0, 2 * Math.PI);
                    ctx.fillStyle = "#ec4899";
                }
                ctx.fill();
                
                ctx.fillStyle = "#f4f4f5";
                ctx.font = "8px monospace";
                ctx.textAlign = "center";
                ctx.fillText(node.label.substring(0, 15), coord.x, coord.y - 10);
            });
        };
        LiteGraph.registerNodeType("output/relationship_graph", RelationshipGraphNode);

            ctx.fillRect(10, 25, this.size[0] - 20, this.size[1] - 35);

            if (!data || !data.events || data.events.length === 0) {

            const startX = 50;

            ctx.beginPath();
            ctx.moveTo(startX, startY);
            ctx.lineTo(startX, endY);
            ctx.stroke();
            
            const numEvents = Math.min(data.events.length, 6);
            const spacing = (endY - startY) / (numEvents + 1);
            
            for (let i = 0; i < numEvents; i++) {
                const ev = data.events[i];
                const y = startY + (i + 1) * spacing;
                
                ctx.fillStyle = "#fbbf24";
                ctx.beginPath();
                ctx.arc(startX, y, 6, 0, 2 * Math.PI);
                ctx.fill();
                
                ctx.fillStyle = "#34d399";
                ctx.font = "bold 9px monospace";
                ctx.textAlign = "right";
                ctx.fillText(ev.date, startX - 12, y + 3);
                
                ctx.fillStyle = "#f4f4f5";
                ctx.font = "8px var(--font-sans)";
                ctx.textAlign = "left";
                const desc = ev.description.length > 35 ? ev.description.substring(0, 35) + "..." : ev.description;

        // == 5. Output & Preview Nodes ==
        function ResultsViewerNode() {
            this.addInput("Results", "search_results");
            this.size = [400, 250];
            this.properties = { results: [] };
        }
        ResultsViewerNode.title = "Results Viewer";
        ResultsViewerNode.color = "#18181b";
        ResultsViewerNode.prototype.onBackendExecuted = function(outputs) {
            if (outputs && outputs[0]) {
                const data = outputs[0];
                let list = [];
                if (data && Array.isArray(data.results)) {
                    list = data.results.map((url, idx) => {
                        if (data.raw_results && data.raw_results[idx]) {
                            const raw = data.raw_results[idx];
                            return {
                                title: raw.title || "Search Result",
                                url: raw.url || url,
                                snippet: raw.snippet || raw.content || "No description available."
                            };
                        }
                        return {
                            title: url,
                            url: url,
                            snippet: "Direct URL link extracted."
                        };
                    });
                }
                this.properties.results = list;
            }
        };
        ResultsViewerNode.prototype.onDrawBackground = function(ctx) {
            if (this.flags.collapsed) return;
            
            ctx.fillStyle = "#09090b";
            ctx.fillRect(10, 25, this.size[0] - 20, this.size[1] - 35);
            
            const list = this.properties.results || [];
            if (list.length === 0) {
                ctx.fillStyle = "#a1a1aa";
                ctx.font = "12px var(--font-sans)";
                ctx.textAlign = "center";
                ctx.fillText("No search results to display", this.size[0] / 2, this.size[1] / 2 + 10);
                return;
            }
            
            const startY = 30;
            const itemHeight = 65;
            const spacing = 10;
            const renderCount = Math.min(list.length, 3);
            
            for (let i = 0; i < renderCount; i++) {
                const item = list[i];
                const y = startY + i * (itemHeight + spacing);
                
                ctx.strokeStyle = "#3f3f46";
                ctx.lineWidth = 1;
                ctx.strokeRect(15, y, this.size[0] - 30, itemHeight);
                
                ctx.fillStyle = "#10b981";
                ctx.font = "bold 11px var(--font-sans)";
                ctx.textAlign = "left";
                const titleStr = item.title.length > 55 ? item.title.substring(0, 52) + "..." : item.title;
                ctx.fillText(titleStr, 25, y + 18);
                
                ctx.fillStyle = "#a1a1aa";
                ctx.font = "9px var(--font-sans)";
                const snippetStr = item.snippet.length > 65 ? item.snippet.substring(0, 62) + "..." : item.snippet;
                ctx.fillText(snippetStr, 25, y + 34);
                
                ctx.fillStyle = "#3b82f6";
                ctx.font = "underline 9px var(--font-sans)";
                const urlStr = item.url.length > 60 ? item.url.substring(0, 57) + "..." : item.url;
                ctx.fillText(urlStr, 25, y + 50);
            }
        };
        ResultsViewerNode.prototype.onMouseDown = function(event, pos, canvas) {
            const list = this.properties.results || [];
            if (list.length === 0) return;
            
            const startY = 30;
            const itemHeight = 65;
            const spacing = 10;
            const renderCount = Math.min(list.length, 3);
            
            const x = pos[0];
            const y = pos[1];
            
            if (x >= 15 && x <= this.size[0] - 15) {
                for (let i = 0; i < renderCount; i++) {
                    const itemY = startY + i * (itemHeight + spacing);
                    if (y >= itemY && y <= itemY + itemHeight) {
                        const url = list[i].url;
                        if (url && url.startsWith("http")) {
                            window.open(url, "_blank");
                            return true;
                        }
                    }
                }
            }
        };
        LiteGraph.registerNodeType("output/results_viewer", ResultsViewerNode);

        function PreviewNode() {
            this.addInput("Image", "image");
            this.size = [220, 220];
            this.properties = {};
            this._image_obj = null;
            this._image_url = null;
        }
        PreviewNode.title = "Image Preview";
        PreviewNode.color = "#18181b"; // matching frame
        PreviewNode.prototype.onExecute = function() {
            const input = this.getInputData(0);
            if (input && input.url) {
                const url = input.url;
                if (this._image_url !== url) {
                    this._image_url = url;
                    this._image_obj = new Image();
                    this._image_obj.src = url.startsWith("/") ? window.location.origin + url : url;
                    this._image_obj.onload = () => {
                        this.setDirtyCanvas(true, true);
                    };
                }
            } else {
                this._image_obj = null;
                this._image_url = null;
            }
        };
        PreviewNode.prototype.onDrawBackground = function(ctx) {
            if (this.flags.collapsed) return;
            
            if (this._image_obj && this._image_obj.complete && this._image_obj.naturalWidth !== 0) {
                const margin = 10;
                const x = margin;
                const y = margin + 15;
                const w = this.size[0] - margin * 2;
                const h = this.size[1] - margin * 2 - 25;
                
                const imgW = this._image_obj.width;
                const imgH = this._image_obj.height;
                const ratio = Math.min(w / imgW, h / imgH);
                
                const drawW = imgW * ratio;
                const drawH = imgH * ratio;
                const drawX = x + (w - drawW) / 2;
                const drawY = y + (h - drawH) / 2;
                
                ctx.fillStyle = "#09090b";
                ctx.fillRect(drawX - 2, drawY - 2, drawW + 4, drawH + 4);
                
                ctx.drawImage(this._image_obj, drawX, drawY, drawW, drawH);
            } else {
                ctx.fillStyle = "#3f3f46";
                ctx.fillRect(10, 25, this.size[0] - 20, this.size[1] - 35);
                ctx.fillStyle = "#a1a1aa";
                ctx.font = "12px var(--font-sans)";
                ctx.textAlign = "center";
                ctx.fillText("No Image Loaded", this.size[0] / 2, this.size[1] / 2 + 10);
            }
        };
        LiteGraph.registerNodeType("output/preview", PreviewNode);

        function OutputDisplayNode() {

            if (outputs && outputs[0]) {

                let data = outputs[0];
                if (typeof data === "object") {

                } else {

                this.properties.value = text;

        OutputDisplayNode.prototype.onDrawBackground = function(ctx) {

            ctx.fillStyle = "#09090b";

            ctx.fillStyle = "#34d399"; // emerald

            const lines = text.split("\n");

        // ── Note (sticky comment, no I/O) ────────────────────────────
        function NoteNode() {
            this.properties = { text: "Double-click to edit…", font_size: 14 };
            this.size = [220, 80];
            this.color = "#1a150a";
            this.bgcolor = "transparent";
            this.resizable = true;
        }
        NoteNode.title = "📝 Note";
        NoteNode.prototype.onDrawBackground = function(ctx) {
            // Warm yellow card
            ctx.save();
            ctx.fillStyle = "rgba(253,224,71,0.10)";
            ctx.strokeStyle = "rgba(253,224,71,0.35)";
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.roundRect(0, 0, this.size[0], this.size[1], 6);
            ctx.fill();
            ctx.stroke();

            const text = this.properties.text || "";
            const fs   = Math.max(10, Math.min(22, this.properties.font_size || 14));
            ctx.fillStyle = "#fef08a";
            ctx.font = `${fs}px sans-serif`;
            ctx.textBaseline = "top";
            const pad = 10, lh = fs + 4, maxW = this.size[0] - pad * 2;
            let y = 6;
            text.split("\n").forEach(line => {
                // simple word-wrap
                const words = line.split(" ");
                let row = "";
                words.forEach(w => {
                    const test = row ? row + " " + w : w;
                    if (ctx.measureText(test).width > maxW && row) {
                        ctx.fillText(row, pad, y);
                        y += lh;
                        row = w;
                    } else { row = test; }
                });
                if (row) { ctx.fillText(row, pad, y); y += lh; }
            });
            ctx.restore();
        };
        NoteNode.prototype.onDblClick = function(e) {
            const text = prompt("Edit note:", this.properties.text || "");
            if (text !== null) {
                this.properties.text = text;
                this.setDirtyCanvas(true);
            }
        };
        LiteGraph.registerNodeType("utility/note", NoteNode);

        // ── Seed Generator ───────────────────────────────────────────
        function SeedNode() {
            this.addOutput("Seed (int)",  "number");
            this.addOutput("Seed (str)",  "string");
            this.addOutput("UUID",        "string");
            this.properties = { mode: "random", seed_value: 0 };
            this.size = [230, 120];
            this.color = "#0f2744";
            this._last_seed = null;

            this.addWidget("combo", "Mode", this.properties.mode,
                (v) => { this.properties.mode = v; this.setDirtyCanvas(true); },
                { values: ["random", "fixed"] });
            this.addWidget("number", "Fixed Seed", this.properties.seed_value,
                (v) => { this.properties.seed_value = Math.round(v); },
                { min: 0, max: 2147483647, step: 1, precision: 0 });
            this.addWidget("button", "🎲 Randomise", null, () => {
                this.properties.seed_value = Math.floor(Math.random() * 2147483648);
                this._last_seed = this.properties.seed_value;
                // Update the number widget display
                if (this.widgets[1]) this.widgets[1].value = this.properties.seed_value;
                this.setDirtyCanvas(true);
            });
        }
        SeedNode.title = "Seed Generator";
        SeedNode.prototype.onDrawForeground = function(ctx) {
            if (this._last_seed === null) return;
            ctx.save();
            ctx.fillStyle = "rgba(59,130,246,0.15)";
            ctx.beginPath();
            ctx.roundRect(8, this.size[1] - 20, this.size[0] - 16, 14, 4);
            ctx.fill();
            ctx.fillStyle = "#93c5fd";
            ctx.font = "10px monospace";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("seed: " + this._last_seed, this.size[0] / 2, this.size[1] - 13);
            ctx.restore();
        };
        SeedNode.prototype.onExecute = function() {
            const seed = this.properties.mode === "fixed"
                ? this.properties.seed_value
                : Math.floor(Math.random() * 2147483648);
            this._last_seed = seed;
            this.setOutputData(0, seed);
            this.setOutputData(1, String(seed));
            // Simple deterministic UUID-like string from seed
            const hex = seed.toString(16).padStart(8, "0");
            this.setOutputData(2, `${hex}-${hex}-4${hex.slice(1)}-a${hex.slice(2)}-${hex}${hex}`);
        };
        SeedNode.prototype.onBackendExecuted = function(outputs) {
            if (outputs) {
                if (outputs[0] !== undefined) { this._last_seed = outputs[0]; this.setOutputData(0, outputs[0]); }
                if (outputs[1] !== undefined) this.setOutputData(1, outputs[1]);
                if (outputs[2] !== undefined) this.setOutputData(2, outputs[2]);
                this.setDirtyCanvas(true);
            }
        };
        LiteGraph.registerNodeType("utility/seed", SeedNode);

        CustomAPINode.prototype.onDrawForeground = function(ctx) {

            const bh = 26, bw = this.size[0] - 20, bx = 10;

            const hasConfig = !!(this.properties.subgraph_config && this.properties.subgraph_config.nodes && this.properties.subgraph_config.nodes.length);
            ctx.save();

            ctx.strokeStyle = hasConfig ? "#10b981" : "#3b82f6";

            ctx.stroke();
            ctx.fillStyle = hasConfig ? "#10b981" : "#7dd3fc";
            ctx.font = "bold 11px sans-serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            const label = hasConfig ? "✓ Subgraph Configured  →" : "→  Enter Subgraph";
            ctx.fillText(label, bx + bw / 2, by + bh / 2);
            ctx.restore();
        };
        CustomAPINode.prototype.onMouseDown = function(e, localPos) {
            if (!this._subgraph_btn_y) return false;
            const bh = 26, bw = this.size[0] - 20, bx = 10, by = this._subgraph_btn_y;
            if (localPos[0] >= bx && localPos[0] <= bx + bw &&
