        // ═══════════════════════════════════════════════════════════════
        // SUBGRAPH EDITOR — Open / Close / Save
        // ═══════════════════════════════════════════════════════════════
        let _sgParentNode = null;
        let _sgGraph = null;
        let _sgCanvas = null;

        function openSubgraphEditor(parentNode) {
            _sgParentNode = parentNode;

            const overlay = document.getElementById("subgraph-overlay");
            const nameEl  = document.getElementById("subgraph-breadcrumb-name");
            nameEl.textContent = parentNode.properties.name || "Custom API";

            overlay.classList.add("open");

            // Init sub-canvas (lazy)
            if (!_sgCanvas) {
                _sgGraph  = new LGraph();
                _sgCanvas = new LGraphCanvas("#subgraph-canvas", _sgGraph);
                _sgCanvas.background_image = null;
                LGraphCanvas.link_type_colors = {
                    "string": "#7dd3fc", "list": "#a78bfa", "search_results": "#f59e0b",
                    "headers": "#fb923c", "number": "#34d399"
                };
            }

            // Load existing subgraph_config or start with default template
            const cfg = parentNode.properties.subgraph_config;
            if (cfg && cfg.nodes && cfg.nodes.length) {
                _sgGraph.configure(cfg);
            } else {
                _sgGraph.clear();
                // Add default starter nodes
                const inputN = LiteGraph.createNode("subgraph/input");
                inputN.pos = [60, 180];
                _sgGraph.add(inputN);

                const httpN = LiteGraph.createNode("subgraph/http_request");
                httpN.pos = [340, 150];
                _sgGraph.add(httpN);

                const outN = LiteGraph.createNode("subgraph/output");
                outN.pos = [700, 180];
                _sgGraph.add(outN);

                // Wire: input.Query → http.Query
                inputN.connect(0, httpN, 0);
            }

            // Populate subgraph sidebar
            buildSubgraphSidebar();

            // Size the sub-canvas
            setTimeout(() => {
                const area = document.querySelector(".subgraph-canvas-area");
                if (area && _sgCanvas) {
                    const r = area.getBoundingClientRect();
                    _sgCanvas.resize(r.width, r.height);
                }
                _sgGraph.start();
            }, 80);
        }

        function buildSubgraphSidebar() {
            const sb = document.getElementById("subgraph-sidebar");
            sb.innerHTML = '<div class="subgraph-sidebar-title">Subgraph Nodes</div>';
            const emojis = {
                "subgraph/input": "🔵",
                "subgraph/http_request": "🌐",
                "subgraph/regex_extract": "🔍",
                "subgraph/json_path": "📦",
                "subgraph/auth_injector": "🔑",
                "subgraph/format_results": "📋",
                "subgraph/output": "🔴"
            };
            SUBGRAPH_NODE_DEFS.forEach(def => {
                const el = document.createElement("div");
                el.className = "subgraph-node-item";
                el.innerHTML = `<span>${emojis[def.type] || "⬡"}</span><span>${def.title}</span>`;
                el.addEventListener("click", () => {
                    if (!_sgGraph || !_sgCanvas) return;
                    const node = LiteGraph.createNode(def.type);
                    if (!node) return;
                    const cx = _sgCanvas.canvas.width  / 2;
                    const cy = _sgCanvas.canvas.height / 2;
                    node.pos = [
                        (-_sgCanvas.ds.offset[0] + cx) / _sgCanvas.ds.scale - node.size[0] / 2,
                        (-_sgCanvas.ds.offset[1] + cy) / _sgCanvas.ds.scale - node.size[1] / 2
                    ];
                    _sgGraph.add(node);
                    _sgCanvas.setDirty(true, true);
                });
                sb.appendChild(el);
            });
        }

        function closeSubgraphEditor(save) {
            if (save && _sgParentNode && _sgGraph) {
                _sgParentNode.properties.subgraph_config = _sgGraph.serialize();
                _sgParentNode.setDirtyCanvas(true, true);
                scheduleAutosave();
            }
            if (_sgGraph) _sgGraph.stop();
            document.getElementById("subgraph-overlay").classList.remove("open");
            _sgParentNode = null;
        }

        document.getElementById("subgraph-save-btn").addEventListener("click",   () => closeSubgraphEditor(true));
        document.getElementById("subgraph-cancel-btn").addEventListener("click", () => closeSubgraphEditor(false));

        // Resize subgraph canvas when window resizes
        window.addEventListener("resize", () => {
            if (_sgCanvas && document.getElementById("subgraph-overlay").classList.contains("open")) {
                const area = document.querySelector(".subgraph-canvas-area");
                if (area) {
                    const r = area.getBoundingClientRect();
                    _sgCanvas.resize(r.width, r.height);
                }
            }
        });



        function populateSidebar() {
            const container = document.getElementById("nodes-container");
            const categories = {};

            // Group nodes by their path (e.g., 'input', 'process')
            // Exclude subgraph/* types — they live only in the subgraph editor
            for (let nodeType in LiteGraph.registered_node_types) {
                if (nodeType.startsWith("subgraph/")) continue;
                let cat = nodeType.split("/")[0];
                if (!categories[cat]) categories[cat] = [];
                categories[cat].push(nodeType);
            }


            // Render categories and items
            for (let cat in categories) {
                let catDiv = document.createElement("div");
                catDiv.className = "node-category";
                catDiv.innerText = cat;
                container.appendChild(catDiv);

                categories[cat].forEach(nodeType => {
                    let item = document.createElement("div");
                    item.className = "node-item";
                    let title = LiteGraph.registered_node_types[nodeType].title || nodeType;
                    item.innerText = title;

                    // Click to spawn node on canvas
                    item.onclick = function() {
                        var node = LiteGraph.createNode(nodeType);
                        if (!node) { console.warn("Could not create node:", nodeType); return; }
                        var cx = canvas.canvas.width / 2;
                        var cy = canvas.canvas.height / 2;
                        node.pos = [
                            (-canvas.ds.offset[0] + cx) / canvas.ds.scale - node.size[0] / 2,
                            (-canvas.ds.offset[1] + cy) / canvas.ds.scale - node.size[1] / 2
                        ];
                        graph.add(node);
                        canvas.setDirty(true, true);
                    };
                    container.appendChild(item);
                });
            }
        }
        populateSidebar();

        // --- Multi-Tab Workflow & Autosaver ---
        let workflowState = {
            activeTabId: "tab-1",
            tabs: [
                {
                    id: "tab-1",
                    name: "OSINT Workflow 1",
                    graph: null
                }
            ]
        };

        let autosaveTimeout = null;
        function scheduleAutosave() {
            if (autosaveTimeout) clearTimeout(autosaveTimeout);
            autosaveTimeout = setTimeout(saveCurrentGraphState, 800); // 800ms debounce
        }

        function saveWorkflowState() {
            localStorage.setItem("searchui_workflows", JSON.stringify(workflowState));
        }

        function saveCurrentGraphState() {
            const activeTab = workflowState.tabs.find(t => t.id === workflowState.activeTabId);
            if (activeTab) {
                activeTab.graph = graph.serialize();
                saveWorkflowState();
            }
        }

        function loadActiveTabGraph() {
            const activeTab = workflowState.tabs.find(t => t.id === workflowState.activeTabId);
            if (activeTab && activeTab.graph) {
                graph.configure(activeTab.graph);
            } else {
                graph.clear();
                const defaultNode = LiteGraph.createNode("input/image");
                if (defaultNode) {
                    defaultNode.pos = [100, 150];
                    graph.add(defaultNode);
                }
            }
            scheduleAutosave();
        }

        function renderTabs() {
            const tabBar = document.getElementById("tab-bar");
            if (!tabBar) return;
            tabBar.innerHTML = "";
            
            workflowState.tabs.forEach(tab => {
                const tabEl = document.createElement("div");
                tabEl.className = `tab-item ${tab.id === workflowState.activeTabId ? 'active' : ''}`;
                tabEl.dataset.id = tab.id;
                
                const nameEl = document.createElement("span");
                nameEl.className = "tab-name";
                nameEl.textContent = tab.name;
                
                tabEl.addEventListener("dblclick", () => {
                    const newName = prompt("Rename workflow:", tab.name);
                    if (newName && newName.trim()) {
                        tab.name = newName.trim();
                        nameEl.textContent = tab.name;
                        saveWorkflowState();
                    }
                });
                
                tabEl.appendChild(nameEl);
                
                if (workflowState.tabs.length > 1) {
                    const closeEl = document.createElement("span");
                    closeEl.className = "tab-close";
                    closeEl.innerHTML = "×";
                    closeEl.addEventListener("click", (e) => {
                        e.stopPropagation();
                        deleteTab(tab.id);
                    });
                    tabEl.appendChild(closeEl);
                }
                
                tabEl.addEventListener("click", () => {
                    if (tab.id !== workflowState.activeTabId) {
                        saveCurrentGraphState();
                        workflowState.activeTabId = tab.id;
                        saveWorkflowState();
                        renderTabs();
                        loadActiveTabGraph();
                    }
                });
                
                tabBar.appendChild(tabEl);
            });
            
            const addBtn = document.createElement("div");
            addBtn.className = "btn-add-tab";
            addBtn.innerHTML = "+";
            addBtn.title = "Create New Workflow";
            addBtn.addEventListener("click", createNewTab);
            tabBar.appendChild(addBtn);
        }

        function createNewTab() {
            saveCurrentGraphState();
            const newId = "tab-" + Date.now();
            const newTab = {
                id: newId,
                name: "OSINT Workflow " + (workflowState.tabs.length + 1),
                graph: null
            };
            workflowState.tabs.push(newTab);
            workflowState.activeTabId = newId;
            saveWorkflowState();
            renderTabs();
            loadActiveTabGraph();
        }

        function deleteTab(tabId) {
            if (confirm("Are you sure you want to delete this workflow tab?")) {
                const idx = workflowState.tabs.findIndex(t => t.id === tabId);
                if (idx !== -1) {
                    workflowState.tabs.splice(idx, 1);
                    if (workflowState.activeTabId === tabId) {
                        workflowState.activeTabId = workflowState.tabs[Math.max(0, idx - 1)].id;
                    }
                    saveWorkflowState();
                    renderTabs();
                    loadActiveTabGraph();
                }
            }
        }

        function loadWorkflowState() {
            const saved = localStorage.getItem("searchui_workflows");
            let loadedSuccessfully = false;
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    if (parsed && Array.isArray(parsed.tabs) && parsed.tabs.length > 0 && parsed.activeTabId) {
                        workflowState = parsed;
                        loadedSuccessfully = true;
                    }
                } catch (e) {
                    console.error("Failed to load workflows:", e);
                }
            }
            
            if (!loadedSuccessfully) {
                workflowState = {
                    activeTabId: "tab-1",
                    tabs: [
                        {
                            id: "tab-1",
                            name: "OSINT Workflow 1",
                            graph: null
                        }
                    ]
                };
                
                graph.clear();
                var n_img = LiteGraph.createNode("input/image");
                n_img.pos = [80, 100];
                graph.add(n_img);

                var n_preview = LiteGraph.createNode("output/preview");
                n_preview.pos = [80, 240];
                graph.add(n_preview);

                var n_hash = LiteGraph.createNode("process/hash");
                n_hash.pos = [380, 150];
                graph.add(n_hash);

                var n_search = LiteGraph.createNode("search/mock");
                n_search.pos = [640, 150];
                graph.add(n_search);

                var n_out = LiteGraph.createNode("output/display");
                n_out.pos = [900, 130];
                graph.add(n_out);

                n_img.connect(0, n_preview, 0);
                n_img.connect(0, n_hash, 0);
                n_hash.connect(0, n_search, 0);
                n_search.connect(0, n_out, 0);
                
                workflowState.tabs[0].graph = graph.serialize();
                saveWorkflowState();
            }
            renderTabs();
            loadActiveTabGraph();
        }

        graph.onNodeAdded = scheduleAutosave;
        graph.onNodeRemoved = scheduleAutosave;
        graph.onConnectionChange = scheduleAutosave;
        canvas.canvas.addEventListener("mouseup", scheduleAutosave);
        
        loadWorkflowState();
        graph.start();

        // --- WebSocket & Execution ---
        const ws_url = (window.location.protocol === "https:" ? "wss://" : "ws://") + window.location.host + "/ws";
        const ws = new WebSocket(ws_url);

        ws.onmessage = function(event) {
            const resBox = document.getElementById("result-box");
            try {
                const response = JSON.parse(event.data);
                if (response.status === "success") {
                    resBox.innerHTML = "<pre style='color: #34d399; margin: 0;'>" + JSON.stringify(response.result, null, 2) + "</pre>";
                    
                    // Update nodes with backend execution outputs
                    if (response.node_outputs) {
                        for (let node_id in response.node_outputs) {
                            let node = graph.getNodeById(Number(node_id));
                            if (node) {
                                let outputs = response.node_outputs[node_id];
                                node.backend_outputs = outputs;
                                if (node.onBackendExecuted) {
                                    node.onBackendExecuted(outputs);
                                }
                            }
                        }
                        canvas.draw(true, true);
                    }
                } else if (response.status === "pending") {
                    resBox.innerHTML = `<span style='color: #fbbf24; font-weight: 500;'>⚡ ${response.message}</span>`;
                } else {
                    resBox.innerHTML = "<span style='color: #ef4444;'>Error: " + response.message + "</span>";
                }
            } catch (e) {
                console.error("WebSocket message parsing error:", e);
                resBox.innerHTML = "<span style='color: #ef4444;'>Error parsing backend response.</span>";
            }
        };

        document.getElementById("executeBtn").addEventListener("click", function() {
            document.getElementById("result-box").innerText = "Running backend pipeline...";
            if (ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify(graph.serialize()));
            } else {
                alert("Backend disconnected. Try refreshing the page.");
            }
        });
    </script>
</body>
</html>
